# QQ机器人基础配置模板
# 复制此文件为 configs/base.yaml 并填写实际值

# 远程API配置(https://github.com/A8Cl233395/BingScraperApi)
REMOTE_API_URL: https://your-remote-api-url.com
REMOTE_API_KEY: your_remote_api_key_here

# 功能开关
ENABLE_OCR: true      # 启用图片OCR识别（需Umi-OCR服务）
ENABLE_STT: true      # 启用语音转文字（需阿里云API密钥）

# 机器人QQ号
SELF_ID: 123456789

# 大模型配置
MODELS:
  deepseek-chat:
    api_key: your_deepseek_api_key_here
    default-thinking: false
    think-during-tool-calls: true
    thinking-toggle-extra-body:
      'false':
        thinking:
          type: disabled
      'true':
        thinking:
          type: enabled
    url: https://api.deepseek.com/beta
  kimi-k2.5:
    api_key: your_kimi_api_key_here
    default-thinking: true
    think-during-tool-calls: true
    thinking-toggle-extra-body:
      'false':
        thinking:
          type: disabled
      'true':
        thinking:
          type: enabled
    url: https://api.moonshot.cn/v1
  qwen3.5-plus:
    api_key: your_qwen_api_key_here
    default-thinking: false
    think-during-tool-calls: false
    thinking-toggle-extra-body:
      'false':
        enable_thinking: false
      'true':
        enable_thinking: true
    url: https://dashscope.aliyuncs.com/compatible-mode/v1