# QQ机器人基础配置模板
# 复制此文件为 configs/base.yaml 并填写实际值

# 远程API配置(https://github.com/A8Cl233395/BingScraperApi)
REMOTE_API_URL: https://your-remote-api-url.com
REMOTE_WEBSOCKET_URI: ws://your-remote-api-url.com/link
REMOTE_API_KEY: your_remote_api_key_here

# 功能开关
ENABLE_OCR: true      # 启用图片OCR识别（需Umi-OCR服务）
ENABLE_STT: true      # 启用语音转文字（需阿里云API密钥）

# 机器人QQ号
SELF_ID: 123456789

# 大模型配置
MODELS:
  deepseek-v4-flash:
    api_key: sk-xxx
    default-thinking: true
    thinking-extra-body:
      'false':
        thinking:
          type: disabled
      'true':
        thinking:
          type: enabled
    url: https://api.deepseek.com/
  kimi-k2.6:
    desc: "Kimi K2.6"
    api_key: sk-xxx
    default-thinking: true
    thinking-extra-body:
      'false':
        thinking:
          type: disabled
      'true':
        thinking:
          type: enabled
          keep: all
    url: https://api.moonshot.cn/v1
  qwen3.6-plus:
    desc: "Qwen3.6 Plus"
    api_key: sk-xxx
    default-thinking: true
    thinking-extra-body:
      'false':
        enable_thinking: false
      'true':
        enable_thinking: true
        preserve_thinking: true
    url: https://dashscope.aliyuncs.com/compatible-mode/v1

LOG_LEVEL: INFO # 日志级别（DEBUG, INFO, WARNING, ERROR, CRITICAL）

ALLOW_ADD_BOT_WITH_TOKEN_VERIFIED: true # 是否允许添加机器人（需验证token）

ALLOW_GET_WEB_TOKEN: true # 是否允许获取网页聊天登录密钥
